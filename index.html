<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Cache-Control" content="no-store" />
  <title>تصاميم ميغالو</title>
  <!-- Arabic-friendly font -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    @font-face{
      font-family: "TS Block Bold";
      src: url("fonts/TS-Block-Bold.ttf") format("truetype");
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }
    :root{
      --bg:#0e0b1a; --ink:#e9e6f4; --muted:#b3adc9;
      --card:#17132a; --radius:28px;
      --brand:#6b55a3;
    }
    @media (prefers-color-scheme: light){
      :root{ --bg:#f7f5fb; --ink:#141025; --muted:#7a7398; --card:#ffffff; }
    }

    html,body{
      margin:0; padding:0; color:var(--ink);
      background:
        linear-gradient(rgba(181,165,255,.055) 1px, transparent 1px),
        linear-gradient(90deg, rgba(181,165,255,.055) 1px, transparent 1px),
        linear-gradient(120deg, #090614 0%, #120d25 48%, #1a1430 100%);
      background-size:44px 44px,44px 44px,auto;
      background-repeat:repeat,repeat,no-repeat;
      background-attachment:fixed;
      overflow-x:hidden; overscroll-behavior-x:none; touch-action:pan-y;
      font-family:"TS Block Bold", "Cairo", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial;
      line-height:1.35;
      font-size:18px;
    }

    body{ position:relative; padding-top:112px; }
    body::after{
      content:"";
      position:fixed;
      inset:0;
      z-index:0;
      pointer-events:none;
      background:
        radial-gradient(520px circle at 8% 8%, color-mix(in oklab,var(--brand) 24%, transparent), transparent 62%),
        radial-gradient(620px circle at 92% 14%, rgba(124,108,210,.14), transparent 58%),
        radial-gradient(680px circle at 52% 108%, rgba(255,255,255,.05), transparent 64%);
      opacity:.82;
    }
    *{box-sizing:border-box}
    body > *{position:relative;z-index:1}

    .hero{position:sticky; top:0; z-index:3; background:linear-gradient(135deg,#16122a 0%,#231c3d 60%,#16122a 100%); border-bottom:1px solid #ffffff14; margin:0}
    .wrap{max-width:1400px; margin:0 auto; padding:14px 16px}
    .hero .wrap{ max-width:none; padding-left:0; padding-right:0; padding-top:20px; padding-bottom:20px }
    .bar{display:flex; align-items:center; gap:16px}
    .contact-bar{ direction:ltr; justify-content:flex-start; padding-left:24px }
    .avatar{ width:72px; height:72px; border-radius:999px; object-fit:cover; border:2px solid #ffffff22; box-shadow:0 0 0 3px color-mix(in oklab, var(--brand) 82%, #000 10%), 0 8px 22px #0008 }
    .contact{ direction:rtl; display:flex; align-items:center; gap:28px }
    .contact .c-item{ color:var(--muted); font-size:16px; line-height:1.2; display:flex; align-items:center; gap:6px; direction:ltr }
    .contact .c-item svg{ width:16px; height:16px; color:var(--ink) }
    .contact .c-item a{ color:#ffffff; font-weight:700; text-decoration:none }
    .contact, .contact .c-item, .contact .c-item a{
      font-family: "Cairo", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial;
      font-weight:600;
    }
    .contact .c-item a:hover{ text-decoration:underline }

    .gallery{max-width:1400px; margin:0 auto; padding:22px 10px 60px; background:transparent}
    .grid{display:grid; gap:8px; grid-template-columns:repeat(3, 1fr)}
    .section-title{ color:#fff; }

    /* Backgs section: wide thumbnails */
    .bg-grid{display:grid; gap:8px; grid-template-columns:9fr 16fr; direction:ltr}
    .bg-card{
      position:relative; aspect-ratio:16/9; width:100%; margin:0 auto;
      border-radius:var(--radius); background:var(--card);
      border:1px solid #2a2f3a; box-shadow:0 22px 60px rgba(0,0,0,.40);
      overflow:hidden; cursor:zoom-in; transition:.18s ease;
    }
    .bg-card.logo{ aspect-ratio:1/1 }
    .bg-card.banner{ aspect-ratio:16/9 }
    .bg-card:hover{ transform:translateY(-3px) }
    .bg-card img{ width:100%; height:100%; display:block; object-fit:cover; border-radius:0; transition:opacity .25s ease }

    .bg-card.logo::before,
    .bg-card.banner::before{ content:none !important }

    .bg-item{ width:100%; margin:0 auto; display:flex; flex-direction:column; align-items:flex-start }
    .bg-label{
      display:inline-block; margin:0 0 4px 0; margin-inline-start:0;
      font-size:10px; font-weight:800; line-height:1.2;
      color:#fff; background: color-mix(in oklab, var(--card) 88%, transparent);
      border:1px solid #ffffff22; border-radius:999px; padding:4px 8px;
      letter-spacing:.2px; align-self:flex-start;
    }
    .bg-item > .bg-card{ width:100%; margin:0 }

    .story-grid{display:flex; flex-direction:column; gap:10px; direction:ltr}
    .story-row{display:grid; gap:6px; width:100%}
    .story-row.row-3{grid-template-columns:repeat(3, minmax(0, 1fr))}
    .story-row.row-2{grid-template-columns:repeat(2, minmax(0, 1fr))}
    .story-grid > .story-row:nth-of-type(3).row-2{
      grid-template-columns: calc(50% + 10px) calc(50% - 10px);
    }
    .story-row.row-1{
      grid-template-columns:repeat(1, minmax(0, 1fr));
      width:clamp(300px, 85vw, 50rem);
      max-width:100%;
      margin:0 auto;
      align-self:center;
      justify-items:center;
    }
    .story-row.row-1 .story-card{
      width:100%;
    }
    .story-card{
      position:relative; aspect-ratio:var(--story-aspect, 4 / 5); width:100%; margin:0;
      border-radius:var(--radius);
      background:var(--card); border:1px solid #2a2f3a; box-shadow:0 22px 60px rgba(0,0,0,.35);
      overflow:hidden; cursor:zoom-in; transition:.18s ease;
    }
    .story-card-wide{ 
      --story-aspect: 4 / 3; 
      border-radius:calc(var(--radius) * 0.8);
      box-shadow:0 22px 60px rgba(0,0,0,.25);
      border:1px solid #2a2f3a;
    }
    .story-img-wide{ 
      object-fit:cover; 
    }
    .story-card.rounded{ border-radius:34px }
    .story-card:hover{ transform:translateY(-3px) }
    .story-card img{ width:100%; height:100%; display:block; object-fit:contain; background:var(--card); border-radius:inherit; transition:opacity .25s ease }
    #stories .story-card, #stories .story-card img{ border-radius:var(--radius) }
    #stories .story-card img{ object-fit:contain }
    #stories .story-card.contain img{ object-fit:contain !important }
    
    .story-row-tall-pair{
      align-items:center;
      justify-content:center;
      margin-left:auto;
      margin-right:auto;
      width:100%;
      gap:8px;
    }
    .story-row-tall-pair .story-card{
      width:100%;
    }
    .story-row-tall-pair--portrait-first{
      grid-template-columns:repeat(2, minmax(0, 1fr));
    }
    .story-row-tall-pair--square-first{
      grid-template-columns:repeat(2, minmax(0, 1fr));
    }
    .story-card-portrait{
      --story-aspect:0.579;
    }
    .story-card-paired-square{
      --story-aspect:0.906;
    }.story-row-tall-pair .story-card img{
      width:100%;
      height:100%;
      object-fit:cover;
      border-radius:inherit;
    }
    
    
    

    .card{
      position:relative; aspect-ratio:1/1;
      margin:0 auto;
      width:96%;
      border-radius:var(--radius);
      background:var(--card);
      border:1px solid #2a2f3a;
      box-shadow:0 22px 60px rgba(0,0,0,.40);
      overflow:hidden;
      cursor:zoom-in; transition:.18s ease;
    }
    .card:hover{ transform:translateY(-3px) }

    .card img{
      width:100%; height:100%; display:block;
      object-fit:cover;
      border-radius:0;
      transition:opacity .25s ease;
    }

    .status{text-align:center; color:var(--muted); padding:12px 10px; font-size:14px}
    .status:empty{ display:none }

    h1, h2, h3, h4, h5, h6{ color:#ffffff }
    .section-title{
      margin:26px auto 26px; color:#ffffff; font-weight:900; font-size:24px;
      position:relative; width:max-content; text-align:center;
      padding:12px 28px 14px; letter-spacing:.2px; isolation:isolate;
    }
    .section-title::before, .section-title::after{
      content: none !important;
    }
    @media (min-width: 900px){
      .section-title{ font-size:28px; padding:14px 34px 16px }
    }
    .gallery{ padding:24px 12px 28px }
    .gallery + .gallery{ margin-top:32px }

    dialog#lightbox{ border:none; padding:0; background:transparent; overflow:hidden; scrollbar-width:none }
    dialog#lightbox::-webkit-scrollbar,.lb-card::-webkit-scrollbar{display:none}
    dialog#lightbox[open]{ position:fixed; inset:0; display:grid; place-items:center; background:transparent; overflow:hidden }
    .lb-backdrop{ position:fixed; inset:0; z-index:1000; background:#000b; backdrop-filter:blur(2px) }
    .lb-card{ position:relative; width:auto; max-width:90vw; max-height:90vh; background:var(--card); border-radius:32px; overflow:hidden; scrollbar-width:none; border:1px solid #ffffff2a; display:flex; flex-direction:column; align-items:center }
    .lb-img{ display:block; width:auto; height:auto; max-width:90vw; max-height:90vh; object-fit:contain; background:#0b0b0b; margin:0 auto; border-radius:24px }
    .lb-bar{ position:absolute; top:12px; left:12px; z-index:3; display:flex; align-items:center; justify-content:center; gap:0; padding:0; border-top:0 }
    .lb-name{ display:none }
    @media (min-width: 900px){
      .lb-card{ max-width:70vw }
      .lb-img{ max-width:70vw }

      .bg-grid{ align-items:stretch }
      .bg-card.banner{ height:100%; aspect-ratio:auto }
    }
    dialog#lightbox[open]{z-index:1001}
    #close{position:relative;width:42px;height:42px;padding:0;border-radius:999px;display:block;background:rgba(10,8,20,.38);border:1px solid rgba(255,255,255,.26);color:transparent;font-size:0;box-shadow:0 12px 32px rgba(0,0,0,.25);backdrop-filter:blur(16px)}
    #close::before{content:"\00d7";position:absolute;inset:0;display:grid;place-items:center;color:#fff;font-family:Arial,sans-serif;font-size:28px;line-height:1;font-weight:400}
    #close:hover{transform:translateY(-2px);border-color:color-mix(in oklab,var(--brand) 72%,#fff 20%);box-shadow:0 16px 38px color-mix(in oklab,var(--brand) 30%,transparent)}
    .btn{background:linear-gradient(180deg, color-mix(in oklab, var(--card) 86%, transparent), color-mix(in oklab, var(--card) 100%, #000 6%)); border:1px solid #ffffff24; color:var(--ink); border-radius:999px; padding:10px 14px; font-weight:700; cursor:pointer}

    @media (max-width: 600px){
      :root{ --radius:14px; }
      body{ padding-top:86px; }
      h1, h2, h3, h4, h5, h6,
      .section-title{
        text-align:center;
        margin-left:auto; margin-right:auto;
        font-family:"TS Block Bold", "Cairo", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial;
        font-weight:normal;
        width:auto;
        max-width:100%;
        white-space:normal;
        overflow-wrap:anywhere;
      }
      .bar{ gap:12px }
      .bar.contact-bar{ flex-direction:row; align-items:center; justify-content:flex-start; padding-left:10px; padding-right:10px; direction:ltr }
      .avatar{ width:56px; height:56px; box-shadow:0 0 0 2px color-mix(in oklab, var(--brand) 82%, #000 10%), 0 6px 18px #0008 }
      .contact{ flex-direction:row; align-items:center; justify-content:flex-start; gap:10px; direction:ltr; flex-wrap:nowrap }
      .contact .c-item{ gap:6px; font-size:13px }
      .contact .c-item svg{ width:14px; height:14px }
      .contact .c-item a{ white-space:nowrap }
      .contact .c-item[title="Instagram"] a{
        font-family:"Cairo", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial;
        font-weight:600; letter-spacing:0; font-size:13px; text-transform:none;
      }
      .contact .c-item[title="WhatsApp"] a{
        font-family:"Cairo", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial;
        font-size:13px; opacity:.95; white-space:nowrap; direction:ltr; font-weight:600;
      }
      .gallery{ padding:8px 10px 24px; }
      .grid{ grid-template-columns:repeat(3, 1fr); gap:4px; }
      .bg-grid{ grid-template-columns:9fr 16fr; gap:4px }
      .story-grid{ gap:8px }
      .story-row{ gap:5px }
      .story-card.rounded{ border-radius:26px }
      .story-row.row-1{
        width:clamp(250px, 90vw, 40rem);
      }
    }

    .bg-label{
      font-family: "Cairo", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial;
      font-weight: 700;
      letter-spacing: 0;
      text-transform: none;
    }

    @media (max-width: 400px){
      .grid{ grid-template-columns:repeat(3, 1fr); gap:2px; }
      .bg-grid{ grid-template-columns:9fr 16fr; gap:2px }
      .story-row{ gap:4px }
    }

    @media (min-width: 1024px){
      .grid{ grid-template-columns:repeat(5, 1fr); gap:12px; }
      .bg-grid{ grid-template-columns:1fr 2fr; gap:12px }
      .card, .bg-card, .story-card{ width:100% }
      .story-row.row-1{
        width:clamp(400px, 75vw, 55rem);
      }
    }

    @media (min-width: 1600px){
      .grid{ grid-template-columns:repeat(6, 1fr); gap:14px }
      .lb-card{ max-width:60vw }
      .lb-img{ max-width:60vw }
      .story-row.row-1{
        width:clamp(500px, 70vw, 60rem);
      }
    }

    img{
      -webkit-user-drag: none;
      user-drag: none;
      -webkit-touch-callout: none;
      user-select: none;
    }
    .anti-ss-on dialog#lightbox .lb-card{ background:#fff !important; }
    .anti-ss-on .lb-img{ opacity:0 !important; background:#fff !important; }
  </style>
  <style>
    .thanks{ font-size:13px; display:inline-block; margin-bottom:12px; font-family:"TS Block Bold","Cairo",ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Arial; font-weight:normal; letter-spacing:0 }
    .dynamic-section{margin-bottom:34px}
    .dynamic-rows{display:grid;gap:10px}
    .dynamic-row{display:grid;direction:ltr;gap:8px;align-items:start;margin:0;width:100%;max-width:100%}
    .dynamic-card{position:relative;width:100%;margin:0;aspect-ratio:var(--ratio, 1);border-radius:var(--radius);background:var(--card);border:1px solid #2a2f3a;box-shadow:0 22px 60px rgba(0,0,0,.35);overflow:hidden;cursor:zoom-in;transition:.18s ease;animation:cardFloat 5.6s ease-in-out infinite}
    .dynamic-row .dynamic-card:nth-child(2n){animation-delay:.7s}
    .dynamic-row .dynamic-card:nth-child(3n){animation-delay:1.25s}
    .dynamic-card:hover{animation-play-state:paused;transform:translateY(-6px)}
    .dynamic-card img{width:100%;height:100%;display:block;object-fit:cover;border-radius:inherit;transition:opacity .25s ease}
    .dynamic-label{position:absolute;top:10px;left:10px;z-index:2;display:inline-block;margin:0;font-size:10px;font-weight:800;line-height:1.2;color:#fff;background:color-mix(in oklab,var(--card) 88%,transparent);border:1px solid #ffffff36;border-radius:999px;padding:4px 8px;box-shadow:0 8px 22px rgba(0,0,0,.28);pointer-events:none}
    @keyframes cardFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
    @media (max-width: 760px){.dynamic-row{gap:4px;max-width:100% !important}.dynamic-label{top:7px;left:7px;font-size:9px;padding:3px 7px}}

    .hero{
      position:fixed;
      top:14px;
      left:50%;
      transform:translateX(-50%);
      z-index:20;
      width:min(1180px,92%);
      margin:0;
      background:transparent;
      border-bottom:0;
    }
    .hero .wrap{max-width:none;padding:0}
    .contact-bar{
      direction:ltr;
      justify-content:space-between;
      gap:18px;
      padding:14px 28px;
      background:
        linear-gradient(135deg,rgba(255,255,255,.09),rgba(255,255,255,.025) 46%,rgba(107,85,163,.11)),
        rgba(16,10,36,.44);
      border:1px solid rgba(255,255,255,.16);
      border-radius:999px;
      backdrop-filter:blur(28px) saturate(145%);
      -webkit-backdrop-filter:blur(28px) saturate(145%);
      box-shadow:0 24px 80px rgba(0,0,0,.34), inset 0 1px 0 rgba(255,255,255,.12), 0 0 42px color-mix(in oklab,var(--brand) 22%,transparent);
    }
    .avatar{
      order:3;
      width:52px;
      height:52px;
      border-radius:999px;
      border:1px solid color-mix(in oklab,var(--brand) 68%,#fff 18%);
      box-shadow:0 0 28px color-mix(in oklab,var(--brand) 72%,transparent);
      flex:0 0 auto;
      margin-inline-end:8px;
    }
    .site-brand{
      order:2;
      margin-inline-start:auto;
      margin-inline-end:2px;
      font-family:"Cairo",ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Arial;
      text-align:right;
    }
    .site-brand strong{display:block;color:#fff;font-size:18px;line-height:1.1;font-weight:900}
    .site-brand small{display:block;color:var(--muted);font-size:13px;font-weight:600;margin-top:4px}
    .contact{
      order:1;
      direction:ltr;
      gap:10px;
      margin-inline-start:8px;
      margin-inline-end:0;
    }
    .contact .c-item{
      position:relative;
      width:40px;
      height:40px;
      padding:0;
      border-radius:999px;
      display:grid;
      place-items:center;
      background:rgba(255,255,255,.055);
      border:1px solid rgba(255,255,255,.22);
      transition:.25s;
    }
    .contact .c-item:hover{
      transform:translateY(-2px);
      background:linear-gradient(135deg,var(--brand),color-mix(in oklab,var(--brand) 54%,#fff 24%));
      box-shadow:0 14px 34px color-mix(in oklab,var(--brand) 48%,transparent);
    }
    .contact .c-item svg{position:absolute;top:50%;left:50%;width:17px;height:17px;margin:0;color:#fff;transform:translate(-50%,-50%);pointer-events:none}
    .contact .c-item a{
      position:absolute;
      inset:0;
      overflow:hidden;
      white-space:nowrap;
      text-indent:110%;
    }
    body > footer{
      background:transparent !important;
      margin-top:32px !important;
      padding:36px 0 44px !important;
      color:var(--muted) !important;
      font-family:"Cairo",ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Arial !important;
    }
    body > footer a{
      position:relative !important;
      overflow:hidden !important;
      display:inline-flex !important;
      flex-direction:row-reverse !important;
      align-items:center !important;
      justify-content:center !important;
      gap:12px !important;
      margin-top:18px !important;
      padding:14px 22px !important;
      border-radius:999px !important;
      color:#f4efff !important;
      text-decoration:none !important;
      font-size:16px !important;
      font-weight:900 !important;
      background:linear-gradient(135deg,color-mix(in oklab,var(--brand) 25%,transparent),color-mix(in oklab,var(--brand) 18%,#000 8%)) !important;
      border:1px solid color-mix(in oklab,var(--brand) 58%,#fff 14%) !important;
      backdrop-filter:blur(18px) !important;
      box-shadow:0 14px 42px color-mix(in oklab,var(--brand) 20%,transparent),inset 0 1px 0 rgba(255,255,255,.16) !important;
      transition:.28s !important;
    }
    body > footer a::before{content:none !important}
    .dev-icon{
      width:34px;
      height:34px;
      border-radius:13px;
      display:grid;
      place-items:center;
      overflow:hidden;
      background:linear-gradient(135deg,var(--brand),color-mix(in oklab,var(--brand) 52%,#fff 28%));
      box-shadow:0 0 22px color-mix(in oklab,var(--brand) 52%,transparent);
      color:#fff;
      flex:0 0 auto;
      margin-inline-start:0;
      position:relative;
      z-index:1;
    }
    .dev-icon svg{width:22px;height:22px;display:block;position:relative;z-index:2}
    body > footer a::after{
      content:"";
      position:absolute;
      top:0;
      right:-90%;
      width:70%;
      height:100%;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,.28),transparent);
      transform:skewX(-18deg);
      transition:.6s;
    }
    body > footer a:hover{
      transform:translateY(-5px) scale(1.02);
      color:#fff !important;
      border-color:color-mix(in oklab,var(--brand) 76%,#fff 18%) !important;
      box-shadow:0 22px 60px color-mix(in oklab,var(--brand) 34%,transparent),inset 0 1px 0 rgba(255,255,255,.22) !important;
    }
    body > footer a:hover::after{right:120%}

    @media (max-width: 600px){
      .hero{top:6px;width:94%}
      .contact-bar{min-height:70px;padding:12px 18px;border-radius:999px}
      .avatar{width:43px;height:43px;border-radius:999px;margin-inline-end:4px}
      .site-brand strong{font-size:15px}
      .site-brand small{font-size:11px}
      .contact{gap:8px;margin-inline-start:4px}
      .contact .c-item{width:38px;height:38px;border-radius:999px}
      footer{ font-size:14px; line-height:1.35; padding:10px 0; }
      footer a{ font-size:14px; }
    }
  </style>
</head>
<body>
  <header class="hero">
    <div class="wrap">
      <div class="bar contact-bar">
        <img class="avatar" src="صورة واتساب بتاريخ 1447-04-06 في 13.40.02_835061ea.jpg" alt="profile" />
        <div class="site-brand">
          <strong>Megalo Des's</strong>
          <small>Design Gallery</small>
